name: Docker E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "test/e2e-docker.test.js"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: SAFE_INSTALL_E2E=1 npm test
